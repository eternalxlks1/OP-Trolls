<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Unblocked Games!</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        color: red;
        font-family: monospace;
    }

    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("https://media.tenor.com/88dnH_mHRLAAAAAM/static-tv-static.gif");
        background-size: cover;
        opacity: 0.2;
        pointer-events: none;
        z-index: 999;
    }

    .warning {
        position: absolute;
        width: 100%;
        text-align: center;
        top: 40%;
        font-size: 32px;
        animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }
</style>
</head>

<body>

<div class="overlay"></div>

<div class="warning">
    SYSTEM ERROR DETECTED
</div>

<script>
alert("Press OK to continue");

// safe glitch effect
setInterval(() => {
    document.body.style.filter =
        Math.random() > 0.5 ? "blur(2px)" : "blur(0px)";
}, 200);

// background flicker
setInterval(() => {
    document.body.style.backgroundColor =
        Math.random() > 0.5 ? "black" : "#120000";
}, 300);
</script>

</body>
</html>
